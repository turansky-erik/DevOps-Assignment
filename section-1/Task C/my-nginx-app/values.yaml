# my-nginx-app/values.yaml

replicaCount: 2

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: nginx.local
      paths:
        - path: /
          pathType: ImplementationSpecific

serviceAccount:
  create: true
 
  annotations: {}
  name: "erik.turansky"
  
  

  
 
autoscaling:
  enabled: false

httpRoute:
  enabled: false
